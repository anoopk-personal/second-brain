# Dependabot Auto-Merge Workflow
# Auto-merges patch and minor Dependabot PRs after CI passes.
# Major version bumps require manual review.
# All actions pinned to full commit SHA.

name: Dependabot auto-merge

# Triggers on all PRs. GitHub Actions does not support filtering pull_request
# by head branch name, so we cannot restrict to dependabot/* branches at the
# trigger level. The `if: github.actor == 'dependabot[bot]'` condition on the
# job is the canonical guard -- non-Dependabot PRs show a SKIPPED check, which
# is the expected behavior per GitHub's own Dependabot auto-merge docs.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch and minor updates
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
