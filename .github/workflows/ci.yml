name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Scan for secrets (public repo -- defense in depth alongside push protection)
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Lint markdown files
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.44.0

      - name: Lint markdown files
        run: |
          # Advisory only -- lint errors do not block PRs
          if find . -name "*.md" -not -path "./.git/*" | grep -q .; then
            markdownlint '**/*.md' --ignore node_modules || true
            echo "Markdown linting completed"
          else
            echo "No markdown files found"
          fi

  # Summary job with consistent name for branch protection rules
  lint-check:
    needs: [secrets-scan, markdown-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check lint results
        env:
          LINT_RESULT: ${{ needs.markdown-lint.result }}
        run: |
          if [ "$LINT_RESULT" = "success" ]; then
            echo "All checks passed"
            exit 0
          fi
          echo "Checks failed or were cancelled"
          exit 1
