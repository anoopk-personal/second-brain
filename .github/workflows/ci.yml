name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # Lint markdown files
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint markdown files
        run: |
          # Advisory only -- lint errors do not block PRs
          if find . -name "*.md" -not -path "./.git/*" | grep -q .; then
            markdownlint '**/*.md' --ignore node_modules || true
            echo "Markdown linting completed"
          else
            echo "No markdown files found"
          fi

  # Summary job with consistent name for branch protection rules
  lint-check:
    needs: [markdown-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check lint results
        run: |
          if [ "${{ needs.markdown-lint.result }}" = "success" ]; then
            echo "All checks passed"
            exit 0
          fi
          echo "Checks failed or were cancelled"
          exit 1
